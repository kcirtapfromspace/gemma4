# Systematic optimization sweep: quantization, prompt engineering, max_tokens.
# Run with: uv run python optimize.py --endpoint http://192.168.150.41:30083

experiments:
  # ============================================================
  # QUANTIZATION EXPERIMENTS (require server restart + model swap)
  # ============================================================

  - name: "quant-q4km-baseline"
    description: "Q4_K_M baseline (3.2GB, current production)"
    model_override: "/models/cliniq-gemma4-e2b-Q4_K_M.gguf"
    server_args:
      ctx_size: 2048
      n_gpu_layers: 99

  - name: "quant-iq4xs"
    description: "IQ4_XS importance quants (~3.0GB)"
    model_override: "/models/cliniq-gemma4-e2b-IQ4_XS.gguf"
    server_args:
      ctx_size: 2048
      n_gpu_layers: 99

  - name: "quant-q3km"
    description: "Q3_K_M quantization (~2.5GB, 18% smaller)"
    model_override: "/models/cliniq-gemma4-e2b-Q3_K_M.gguf"
    server_args:
      ctx_size: 2048
      n_gpu_layers: 99

  - name: "quant-q3ks"
    description: "Q3_K_S quantization (~2.4GB, 21% smaller)"
    model_override: "/models/cliniq-gemma4-e2b-Q3_K_S.gguf"
    server_args:
      ctx_size: 2048
      n_gpu_layers: 99

  - name: "quant-q2k"
    description: "Q2_K quantization (~2.3GB, aggressive, quality risk)"
    model_override: "/models/cliniq-gemma4-e2b-Q2_K.gguf"
    server_args:
      ctx_size: 2048
      n_gpu_layers: 99

  # ============================================================
  # PROMPT ENGINEERING (client-side only, no server restart)
  # ============================================================

  - name: "prompt-no-confidence"
    description: "Remove confidence score instruction"
    skip_restart: true
    system_prompt: "Extract clinical entities from this eICR summary. Output JSON with: patient demographics, conditions (SNOMED/ICD-10), labs (LOINC), medications (RxNorm), vitals, and a case summary. Output valid JSON only."
    server_args:
      ctx_size: 2048
      n_gpu_layers: 99

  - name: "prompt-compact"
    description: "Compact JSON, no summary, abbreviated keys"
    skip_restart: true
    system_prompt: "Extract entities from this eICR. Output compact JSON with keys: patient, conditions (SNOMED), labs (LOINC), meds (RxNorm), vitals. No summary. Valid JSON only."
    server_args:
      ctx_size: 2048
      n_gpu_layers: 99

  - name: "prompt-minimal"
    description: "Minimal prompt, extreme compression"
    skip_restart: true
    system_prompt: "Extract: patient, conditions(snomed,icd10), labs(loinc), meds(rxnorm), vitals from this eICR. JSON only, no summary, no confidence."
    server_args:
      ctx_size: 2048
      n_gpu_layers: 99

  # ============================================================
  # MAX_TOKENS EXPERIMENTS (client-side only)
  # ============================================================

  - name: "maxtok-512"
    description: "max_tokens=512 (vs 1024 baseline)"
    skip_restart: true
    max_tokens: 512
    server_args:
      ctx_size: 2048
      n_gpu_layers: 99

  - name: "maxtok-384"
    description: "max_tokens=384"
    skip_restart: true
    max_tokens: 384
    server_args:
      ctx_size: 2048
      n_gpu_layers: 99

  - name: "maxtok-256"
    description: "max_tokens=256 (tight, may truncate)"
    skip_restart: true
    max_tokens: 256
    server_args:
      ctx_size: 2048
      n_gpu_layers: 99

