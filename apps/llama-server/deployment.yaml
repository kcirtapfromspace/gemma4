apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-server
  namespace: gemma4
  labels:
    app: llama-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama-server
  template:
    metadata:
      labels:
        app: llama-server
    spec:
      nodeSelector:
        kubernetes.io/hostname: talos-jetson-3
      containers:
        - name: llama-server
          image: 192.168.25.201:5050/llama-server:latest
          imagePullPolicy: IfNotPresent
          command: ["/cuda-build/bin/llama-server"]
          args:
            - "-m"
            - "/models/gemma-4-E2B-it-Q3_K_M.gguf"
            - "--lora"
            - "/models/cliniq-compact-lora.gguf"
            - "--port"
            - "8080"
            - "--host"
            - "0.0.0.0"
            - "--ctx-size"
            - "1536"
            - "--n-gpu-layers"
            - "99"
            - "--reasoning-budget"
            - "0"
            - "--parallel"
            - "1"
          ports:
            - containerPort: 8080
              name: api
          securityContext:
            privileged: true
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "7Gi"
              cpu: "4"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          env:
            - name: LD_LIBRARY_PATH
              value: "/cuda-build/lib:/usr/lib/aarch64-linux-gnu/tegra:/usr/local/cuda/compat:/usr/local/cuda/lib64"
          volumeMounts:
            - mountPath: /cuda-build
              name: cuda-build
              readOnly: true
            - mountPath: /models
              name: models
            - mountPath: /dev/nvgpu
              name: dev-nvgpu
            - mountPath: /dev/nvhost-gpu
              name: dev-nvhost-gpu
            - mountPath: /dev/nvhost-ctrl
              name: dev-nvhost-ctrl
            - mountPath: /dev/nvhost-ctrl-gpu
              name: dev-nvhost-ctrl-gpu
            - mountPath: /dev/nvhost-as-gpu
              name: dev-nvhost-as-gpu
            - mountPath: /dev/nvhost-dbg-gpu
              name: dev-nvhost-dbg-gpu
            - mountPath: /dev/nvhost-tsg-gpu
              name: dev-nvhost-tsg-gpu
            - mountPath: /dev/nvmap
              name: dev-nvmap
      volumes:
        - name: cuda-build
          hostPath:
            path: /var/lib/cliniq/llama-build
        - name: models
          hostPath:
            path: /var/lib/ollama/models
            type: DirectoryOrCreate
        - name: dev-nvgpu
          hostPath:
            path: /dev/nvgpu
        - name: dev-nvhost-gpu
          hostPath:
            path: /dev/nvhost-gpu
        - name: dev-nvhost-ctrl
          hostPath:
            path: /dev/nvhost-ctrl
        - name: dev-nvhost-ctrl-gpu
          hostPath:
            path: /dev/nvhost-ctrl-gpu
        - name: dev-nvhost-as-gpu
          hostPath:
            path: /dev/nvhost-as-gpu
        - name: dev-nvhost-dbg-gpu
          hostPath:
            path: /dev/nvhost-dbg-gpu
        - name: dev-nvhost-tsg-gpu
          hostPath:
            path: /dev/nvhost-tsg-gpu
        - name: dev-nvmap
          hostPath:
            path: /dev/nvmap
---
apiVersion: v1
kind: Service
metadata:
  name: llama-server
  namespace: gemma4
spec:
  selector:
    app: llama-server
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30083
  type: NodePort
