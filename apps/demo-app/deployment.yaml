apiVersion: apps/v1
kind: Deployment
metadata:
  name: eicr-fhir-demo
  namespace: gemma4
  labels:
    app: eicr-fhir-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eicr-fhir-demo
  template:
    metadata:
      labels:
        app: eicr-fhir-demo
    spec:
      containers:
        - name: demo
          image: 192.168.25.201:5050/eicr-fhir-demo:latest
          ports:
            - containerPort: 8080
          env:
            - name: OLLAMA_URL
              value: "http://ollama.gemma4.svc:11434"
            - name: MODEL_NAME
              value: "gemma4-eicr-fhir"
            - name: PORT
              value: "8080"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: eicr-fhir-demo
  namespace: gemma4
spec:
  selector:
    app: eicr-fhir-demo
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
