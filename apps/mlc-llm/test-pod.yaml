apiVersion: v1
kind: Pod
metadata:
  name: mlc-test
  namespace: gemma4
spec:
  nodeSelector:
    kubernetes.io/hostname: talos-jetson-3
  containers:
    - name: mlc
      image: dustynv/mlc:0.20.0-r36.4.0
      command: ["sleep", "infinity"]
      securityContext:
        privileged: true
      resources:
        requests:
          memory: "4Gi"
          cpu: "2"
        limits:
          memory: "7Gi"
          cpu: "6"
      env:
        - name: LD_LIBRARY_PATH
          value: "/usr/local/cuda/compat:/usr/local/cuda/lib64:/usr/lib/aarch64-linux-gnu/tegra"
        - name: HF_HOME
          value: "/models/hf-cache"
      volumeMounts:
        - mountPath: /models
          name: models
        - mountPath: /dev/nvgpu
          name: dev-nvgpu
        - mountPath: /dev/nvhost-gpu
          name: dev-nvhost-gpu
        - mountPath: /dev/nvhost-ctrl
          name: dev-nvhost-ctrl
        - mountPath: /dev/nvhost-ctrl-gpu
          name: dev-nvhost-ctrl-gpu
        - mountPath: /dev/nvhost-as-gpu
          name: dev-nvhost-as-gpu
        - mountPath: /dev/nvhost-dbg-gpu
          name: dev-nvhost-dbg-gpu
        - mountPath: /dev/nvhost-tsg-gpu
          name: dev-nvhost-tsg-gpu
        - mountPath: /dev/nvmap
          name: dev-nvmap
  restartPolicy: Never
  volumes:
    - name: models
      hostPath:
        path: /var/lib/ollama/models
    - name: dev-nvgpu
      hostPath:
        path: /dev/nvgpu
    - name: dev-nvhost-gpu
      hostPath:
        path: /dev/nvhost-gpu
    - name: dev-nvhost-ctrl
      hostPath:
        path: /dev/nvhost-ctrl
    - name: dev-nvhost-ctrl-gpu
      hostPath:
        path: /dev/nvhost-ctrl-gpu
    - name: dev-nvhost-as-gpu
      hostPath:
        path: /dev/nvhost-as-gpu
    - name: dev-nvhost-dbg-gpu
      hostPath:
        path: /dev/nvhost-dbg-gpu
    - name: dev-nvhost-tsg-gpu
      hostPath:
        path: /dev/nvhost-tsg-gpu
    - name: dev-nvmap
      hostPath:
        path: /dev/nvmap
