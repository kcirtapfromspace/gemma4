<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClinIQ — Hackathon Launch Readiness</title>
<style>
  :root {
    --bg-0: #07090f;
    --bg-1: #0c0f17;
    --bg-2: #11151f;
    --bg-3: #161b27;
    --bg-4: #1d2230;
    --border: #232938;
    --border-2: #2c3346;
    --text: #e7ebf3;
    --text-2: #9aa1b1;
    --text-3: #5b6273;
    --accent-1: #14b8a6;
    --accent-2: #06b6d4;
    --green: #22c55e;
    --green-soft: rgba(34, 197, 94, .14);
    --amber: #f59e0b;
    --amber-soft: rgba(245, 158, 11, .14);
    --red: #ef4444;
    --red-soft: rgba(239, 68, 68, .14);
    --blue: #60a5fa;
    --blue-soft: rgba(96, 165, 250, .14);
    --purple: #a855f7;
    --purple-soft: rgba(168, 85, 247, .14);
    --mono: 'SF Mono', 'Fira Code', 'Menlo', 'Monaco', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: radial-gradient(ellipse at top, #0e1320 0%, var(--bg-0) 55%) fixed;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
    min-height: 100vh;
  }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-track { background: var(--bg-1); }
  *::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 6px; }
  *::-webkit-scrollbar-thumb:hover { background: #3a4258; }

  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(7, 9, 15, .82);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner { max-width: 1280px; margin: 0 auto; padding: 22px 32px 0 32px; }
  .titlebar { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  h1 {
    margin: 0; font-size: 30px; font-weight: 700; letter-spacing: -.02em;
    background: linear-gradient(120deg, var(--accent-1), var(--accent-2) 60%, #a855f7);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { color: var(--text-2); margin: 6px 0 0 0; font-size: 15px; max-width: 760px; }
  .countdown {
    text-align: right;
    padding: 10px 18px; border-radius: 10px;
    background: linear-gradient(180deg, var(--bg-3), var(--bg-2));
    border: 1px solid var(--border-2);
    min-width: 200px;
  }
  .countdown .num {
    font-family: var(--mono); font-size: 32px; font-weight: 700;
    background: linear-gradient(120deg, var(--accent-1), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    line-height: 1;
  }
  .countdown .lbl { font-size: 11px; color: var(--text-2); text-transform: uppercase; letter-spacing: .12em; margin-top: 6px; }
  .countdown .deadline { font-size: 12px; color: var(--text-3); font-family: var(--mono); margin-top: 4px; }

  .tech-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
  .tech-pill {
    font-family: var(--mono); font-size: 11.5px; padding: 4px 10px; border-radius: 999px;
    background: var(--bg-2); border: 1px solid var(--border); color: var(--text-2);
  }

  nav.tabs {
    display: flex; gap: 4px; padding: 14px 0 0 0; margin-top: 16px;
    border-bottom: 1px solid var(--border); overflow-x: auto;
  }
  nav.tabs button {
    background: transparent; color: var(--text-2); border: none; cursor: pointer;
    padding: 11px 18px; font-size: 14px; font-family: inherit;
    border-bottom: 2px solid transparent; transition: color .2s, border-color .2s;
    white-space: nowrap;
  }
  nav.tabs button:hover { color: var(--text); }
  nav.tabs button.active { color: var(--text); border-bottom-color: var(--accent-1); }

  main { max-width: 1280px; margin: 0 auto; padding: 32px; }
  .panel { display: none; animation: fade-in .25s ease; }
  .panel.active { display: block; }
  @keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .section-title {
    font-size: 12px; text-transform: uppercase; letter-spacing: .14em; color: var(--text-2);
    margin: 28px 0 12px 0; font-weight: 600;
  }
  .section-title:first-child { margin-top: 0; }

  .stat-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px;
  }
  .stat-card {
    background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px; position: relative; overflow: hidden;
    transition: transform .2s, border-color .2s;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent-1);
  }
  .stat-card.green::before { background: var(--green); }
  .stat-card.amber::before { background: var(--amber); }
  .stat-card.red::before { background: var(--red); }
  .stat-card.blue::before { background: var(--blue); }
  .stat-card.purple::before { background: var(--purple); }
  .stat-card:hover { transform: translateY(-2px); border-color: var(--border-2); }
  .stat-card .stat-label {
    font-size: 11px; color: var(--text-2); text-transform: uppercase; letter-spacing: .1em; font-weight: 600;
  }
  .stat-card .stat-value {
    font-family: var(--mono); font-size: 26px; margin-top: 8px; font-weight: 700; color: var(--text);
  }
  .stat-card .stat-value.small { font-size: 18px; }
  .stat-card .stat-sub {
    font-size: 12px; color: var(--text-2); margin-top: 4px; font-family: var(--mono);
  }

  .progress-list { display: flex; flex-direction: column; gap: 14px; }
  .progress-row {
    display: grid; grid-template-columns: 200px 1fr 110px; align-items: center; gap: 16px;
  }
  .progress-row .pl-label { font-size: 14px; color: var(--text); }
  .progress-row .pl-bar {
    background: var(--bg-3); height: 10px; border-radius: 6px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-row .pl-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
    transition: width .8s cubic-bezier(.16, 1, .3, 1);
  }
  .progress-row.green .pl-bar-fill { background: linear-gradient(90deg, #16a34a, var(--green)); }
  .progress-row.amber .pl-bar-fill { background: linear-gradient(90deg, #d97706, var(--amber)); }
  .progress-row.red .pl-bar-fill { background: linear-gradient(90deg, #dc2626, var(--red)); }
  .progress-row .pl-value {
    font-family: var(--mono); font-size: 12px; color: var(--text-2); text-align: right;
  }

  .working-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 8px;
  }
  .working-grid .w-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    background: var(--green-soft); border: 1px solid rgba(34, 197, 94, .25);
    border-radius: 8px; font-size: 13.5px; color: var(--text);
  }
  .working-grid .w-item::before {
    content: '\2713'; color: var(--green); font-weight: 700; font-family: var(--mono);
  }

  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .filter-row button {
    background: var(--bg-2); border: 1px solid var(--border); color: var(--text-2);
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12.5px;
    font-family: inherit; transition: all .2s;
  }
  .filter-row button:hover { color: var(--text); border-color: var(--border-2); }
  .filter-row button.active { background: var(--accent-1); color: #001b18; border-color: var(--accent-1); font-weight: 600; }

  .cat-block { margin-bottom: 28px; }
  .cat-title {
    display: flex; align-items: center; gap: 10px; font-size: 13px;
    color: var(--text); text-transform: uppercase; letter-spacing: .1em; font-weight: 600;
    margin-bottom: 12px;
  }
  .cat-count { font-family: var(--mono); font-size: 11px; color: var(--text-3); font-weight: 400; }

  .comp-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 12px;
  }
  .comp-card {
    background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; cursor: pointer; transition: border-color .2s, transform .2s;
  }
  .comp-card:hover { border-color: var(--border-2); transform: translateY(-1px); }
  .comp-card.expanded { border-color: var(--accent-1); }
  .comp-card .ch-row { display: flex; align-items: center; gap: 10px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.complete { background: var(--green); box-shadow: 0 0 8px rgba(34, 197, 94, .5); }
  .status-dot.partial { background: var(--amber); box-shadow: 0 0 8px rgba(245, 158, 11, .5); }
  .status-dot.missing { background: var(--red); box-shadow: 0 0 8px rgba(239, 68, 68, .5); }
  .status-dot.stub { background: var(--text-3); }
  .comp-card .name { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); }
  .comp-card .badge {
    font-size: 10.5px; padding: 2px 8px; border-radius: 4px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .08em;
  }
  .badge.complete { background: var(--green-soft); color: var(--green); }
  .badge.partial { background: var(--amber-soft); color: var(--amber); }
  .badge.missing { background: var(--red-soft); color: var(--red); }
  .badge.stub { background: rgba(91, 98, 115, .3); color: var(--text-2); }
  .comp-card .arrow { color: var(--text-3); transition: transform .2s; font-size: 12px; }
  .comp-card.expanded .arrow { transform: rotate(90deg); }
  .comp-card .detail {
    display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
    font-size: 13px; color: var(--text-2);
  }
  .comp-card.expanded .detail { display: block; }
  .comp-card .file-chip {
    display: inline-block; font-family: var(--mono); font-size: 11px;
    background: var(--bg-3); padding: 3px 8px; border-radius: 4px;
    color: var(--text-2); margin-top: 8px; border: 1px solid var(--border);
  }
  .comp-card .tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .comp-card .tag {
    font-family: var(--mono); font-size: 10.5px; padding: 2px 7px; border-radius: 4px;
    background: var(--bg-3); color: var(--text-2); border: 1px solid var(--border);
  }

  .arch-layer {
    display: grid; grid-template-columns: 130px 1fr; gap: 16px; padding: 14px 0;
    border-bottom: 1px dashed var(--border);
  }
  .arch-layer:last-child { border-bottom: none; }
  .arch-layer-label {
    font-size: 11.5px; text-transform: uppercase; letter-spacing: .12em;
    color: var(--text-2); padding-top: 8px; font-weight: 600;
  }
  .arch-boxes { display: flex; flex-wrap: wrap; gap: 8px; }
  .arch-box {
    background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; font-size: 12.5px; color: var(--text);
    display: flex; flex-direction: column; gap: 3px; min-width: 120px;
  }
  .arch-box .arch-name { font-weight: 500; }
  .arch-box .arch-meta { font-family: var(--mono); font-size: 10.5px; color: var(--text-3); }
  .arch-box.primary { border-color: var(--accent-1); background: linear-gradient(180deg, rgba(20, 184, 166, .12), var(--bg-2)); }
  .arch-box.input { border-color: var(--blue); background: rgba(96, 165, 250, .08); }
  .arch-box.output { border-color: var(--purple); background: rgba(168, 85, 247, .08); }

  .flow-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 14px 0;
  }
  .flow-step {
    background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; min-width: 150px; flex: 1; max-width: 200px;
  }
  .flow-step .icon { font-size: 18px; margin-bottom: 4px; }
  .flow-step .step-name { font-size: 13.5px; font-weight: 500; color: var(--text); }
  .flow-step .step-actor { font-size: 11px; color: var(--accent-1); font-family: var(--mono); margin-top: 2px; }
  .flow-step .step-desc { font-size: 12px; color: var(--text-2); margin-top: 6px; line-height: 1.4; }
  .flow-arrow { color: var(--text-3); font-size: 18px; flex-shrink: 0; }

  .kanban { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; }
  .kanban-col {
    background: var(--bg-1); border: 1px solid var(--border); border-radius: 12px; padding: 14px;
  }
  .kanban-col h3 {
    font-size: 12px; text-transform: uppercase; letter-spacing: .12em;
    margin: 0 0 12px 0; padding: 6px 10px; border-radius: 6px; font-weight: 600;
    display: flex; justify-content: space-between; align-items: center;
  }
  .kanban-col.critical h3 { background: var(--red-soft); color: var(--red); }
  .kanban-col.high h3 { background: var(--amber-soft); color: var(--amber); }
  .kanban-col.medium h3 { background: var(--blue-soft); color: var(--blue); }
  .blocker-card {
    background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; margin-bottom: 10px;
  }
  .blocker-card .b-title { font-size: 13.5px; font-weight: 500; color: var(--text); }
  .blocker-card .b-desc { font-size: 12px; color: var(--text-2); margin-top: 6px; line-height: 1.45; }
  .blocker-card .b-meta { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .blocker-card .b-effort {
    font-family: var(--mono); font-size: 10.5px; padding: 2px 7px;
    background: var(--bg-3); border: 1px solid var(--border); border-radius: 4px; color: var(--text-2);
  }
  .blocker-card .b-tag {
    font-family: var(--mono); font-size: 10.5px; padding: 2px 7px;
    background: var(--bg-3); border-radius: 4px; color: var(--text-2);
  }
  .blocker-card .b-files { font-family: var(--mono); font-size: 10.5px; color: var(--text-3); margin-top: 6px; }

  .ck-list { display: flex; flex-direction: column; gap: 8px; }
  .ck-group {
    background: var(--bg-1); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 16px;
  }
  .ck-group h3 {
    font-size: 13px; margin: 0 0 12px 0; display: flex; align-items: center; gap: 10px;
    text-transform: uppercase; letter-spacing: .1em; color: var(--text); font-weight: 600;
  }
  .priority-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .priority-critical { background: var(--red); }
  .priority-high { background: var(--amber); }
  .priority-medium { background: var(--blue); }
  .priority-low { background: var(--green); }
  .ck-item {
    display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px;
    border-radius: 6px; cursor: pointer; transition: background .15s;
  }
  .ck-item:hover { background: var(--bg-2); }
  .ck-item input[type="checkbox"] {
    margin-top: 3px; cursor: pointer; accent-color: var(--accent-1); flex-shrink: 0;
  }
  .ck-item .ck-text { font-size: 13.5px; color: var(--text); flex: 1; }
  .ck-item .ck-detail {
    display: block; font-family: var(--mono); font-size: 11px; color: var(--text-3); margin-top: 3px;
  }
  .ck-item.done .ck-text { text-decoration: line-through; color: var(--text-3); }
  .ck-item.done .ck-detail { opacity: .5; }

  .progress-bar-large {
    background: var(--bg-3); height: 14px; border-radius: 8px; overflow: hidden;
    margin: 18px 0 24px 0; border: 1px solid var(--border); position: relative;
  }
  .progress-bar-large .fill {
    height: 100%; background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
    transition: width .6s cubic-bezier(.16, 1, .3, 1); position: relative;
  }
  .progress-bar-large .label {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--text);
  }

  .summary-block {
    background: var(--bg-1); border: 1px solid var(--border-2); border-radius: 12px;
    padding: 18px 22px; margin-top: 36px; position: relative;
  }
  .summary-block h3 { margin: 0 0 12px 0; font-size: 13px; color: var(--text-2); text-transform: uppercase; letter-spacing: .1em; }
  .summary-block pre {
    font-family: var(--mono); font-size: 12.5px; color: var(--text); line-height: 1.7;
    white-space: pre-wrap; margin: 0;
  }
  .copy-btn {
    position: absolute; top: 14px; right: 16px;
    background: var(--bg-3); border: 1px solid var(--border-2); color: var(--text-2);
    padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 11.5px;
    font-family: var(--mono); transition: all .2s;
  }
  .copy-btn:hover { background: var(--accent-1); color: #001b18; border-color: var(--accent-1); }

  .timeline {
    position: relative; padding-left: 28px;
  }
  .timeline::before {
    content: ''; position: absolute; left: 7px; top: 6px; bottom: 6px;
    width: 2px; background: var(--border-2);
  }
  .tl-item {
    position: relative; padding: 4px 0 18px 0;
  }
  .tl-item::before {
    content: ''; position: absolute; left: -25px; top: 8px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--bg-3); border: 2px solid var(--accent-1);
  }
  .tl-item.done::before { background: var(--green); border-color: var(--green); }
  .tl-item.now::before { background: var(--accent-1); border-color: var(--accent-1); box-shadow: 0 0 12px rgba(20, 184, 166, .6); }
  .tl-item.future::before { background: var(--bg-2); border-color: var(--text-3); }
  .tl-date { font-family: var(--mono); font-size: 11px; color: var(--accent-1); font-weight: 600; }
  .tl-title { font-size: 14px; color: var(--text); margin-top: 2px; font-weight: 500; }
  .tl-desc { font-size: 12.5px; color: var(--text-2); margin-top: 2px; }

  @media (max-width: 768px) {
    .header-inner, main { padding: 18px; }
    .titlebar { flex-direction: column; }
    .countdown { width: 100%; }
    h1 { font-size: 24px; }
    .progress-row { grid-template-columns: 1fr; }
    .progress-row .pl-value { text-align: left; }
    .arch-layer { grid-template-columns: 1fr; }
    .arch-layer-label { padding: 0 0 6px 0; }
    .flow-row { flex-direction: column; align-items: stretch; }
    .flow-arrow { transform: rotate(90deg); align-self: center; }
  }
  @media print {
    body { background: #fff; color: #111; }
    nav.tabs { display: none; }
    .panel { display: block !important; page-break-after: always; }
    .stat-card, .comp-card, .blocker-card, .arch-box, .flow-step, .ck-group, .summary-block { background: #fafafa; border-color: #ccc; color: #111; }
    .copy-btn { display: none; }
    h1 { color: #0f766e; -webkit-text-fill-color: #0f766e; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="titlebar">
      <div>
        <h1>ClinIQ &mdash; Launch Readiness</h1>
        <p class="subtitle">eICR&nbsp;&rarr;&nbsp;FHIR&nbsp;R4 conversion on the edge with Gemma&nbsp;4. Submission for the Gemma&nbsp;4&nbsp;Good hackathon (Kaggle&nbsp;&times;&nbsp;Google&nbsp;DeepMind), targeting Health&nbsp;Impact and Unsloth&nbsp;($10K) tracks.</p>
      </div>
      <div class="countdown">
        <div class="num" id="days-left">18</div>
        <div class="lbl">days to deadline</div>
        <div class="deadline">2026-05-18 23:59 PT</div>
      </div>
    </div>
    <div class="tech-row" id="tech-row"></div>
    <nav class="tabs" id="tabs"></nav>
  </div>
</header>

<main id="main"></main>

<script>
  // ============================================================
  // DATA
  // ============================================================
  const TECH = ['Gemma 4 E2B','Unsloth','llama.cpp','PyTorch','PEFT + TRL','SwiftUI','iOS 26','Talos k8s','Jetson Orin NX','HF Spaces','ZeroGPU H200','FHIR R4','HL7 CDA','SNOMED-CT','LOINC','RxNorm','fhir.resources','Gradio 5'];

  const TAB_NAMES = [
    {id: 'overview', label: 'Overview'},
    {id: 'components', label: 'Components'},
    {id: 'architecture', label: 'Architecture'},
    {id: 'workflows', label: 'Workflows'},
    {id: 'roadmap', label: 'Roadmap'},
    {id: 'blockers', label: 'Blockers'},
    {id: 'checklist', label: 'Checklist'}
  ];

  const stats = [
    {label: 'F1 sustained', value: '1.000', sub: '80 reps, 0 FPs', cls: 'green'},
    {label: 'F1 combined-64', value: '0.997', sub: 'recall = 1.000', cls: 'green'},
    {label: 'CDC eICR vectors', value: '7 / 7', sub: '360 / 360 codes', cls: 'green'},
    {label: 'HL7 Java validator', value: '100%', sub: 'every Bundle valid', cls: 'green'},
    {label: 'Jetson edge F1', value: '1.000', sub: 'Orin NX 8 GB', cls: 'green'},
    {label: 'Unsloth v62 F1', value: '0.823', sub: '+0.486 vs base, 1.6x faster', cls: 'amber'},
    {label: 'Sustained-load reps', value: '80', sub: 'fully deterministic', cls: 'blue'},

  // ============================================================
  // DOM HELPERS
  // ============================================================
  function el(tag, attrs, children) {
    const e = document.createElement(tag);
    if (attrs) Object.entries(attrs).forEach(([k, v]) => {
      if (k === 'className') e.className = v;
      else if (k === 'textContent') e.textContent = v;
      else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
      else if (v != null) e.setAttribute(k, v);
    });
    if (children) {
      if (typeof children === 'string') e.textContent = children;
      else if (Array.isArray(children)) children.forEach(c => { if (c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
      else e.appendChild(typeof children === 'string' ? document.createTextNode(children) : children);
    }
    return e;
  }
  function clearChildren(node) {
    while (node.firstChild) node.removeChild(node.firstChild);
  }

    cats.forEach(c => {
      const count = components.filter(co => co.cat === c.id).length;
      fr.appendChild(el('button', {'data-filter': c.id, onClick: () => applyFilter(c.id)}, c.label.split(' ')[0] + ' (' + count + ')'));
    });
    ['complete', 'partial', 'missing'].forEach(s => {
      const count = components.filter(co => co.status === s).length;
      if (count > 0) fr.appendChild(el('button', {'data-filter': 's-' + s, onClick: () => applyFilter('s-' + s)}, s + ' (' + count + ')'));
    });
    p.appendChild(fr);

    const blocks = {};
    cats.forEach(c => {
      const block = el('div', {className: 'cat-block', 'data-cat': c.id});
      const title = el('div', {className: 'cat-title'});
      title.appendChild(el('span', null, c.label));
      const items = components.filter(co => co.cat === c.id);
      title.appendChild(el('span', {className: 'cat-count'}, items.length + ' components'));
      block.appendChild(title);
      const grid = el('div', {className: 'comp-grid'});
      items.forEach(comp => grid.appendChild(buildCompCard(comp)));
      block.appendChild(grid);
      p.appendChild(block);
      blocks[c.id] = block;
    });

    function applyFilter(f) {
      document.querySelectorAll('.filter-row button').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
      const isStatus = f.startsWith('s-');
      Object.entries(blocks).forEach(([cid, block]) => {
        if (f === 'all') {
          block.style.display = '';
          block.querySelectorAll('.comp-card').forEach(c => c.style.display = '');
        } else if (isStatus) {
          block.style.display = '';
          let any = false;
          block.querySelectorAll('.comp-card').forEach(c => {
            const show = c.dataset.status === f.slice(2);
            c.style.display = show ? '' : 'none';
            if (show) any = true;
          });
          block.style.display = any ? '' : 'none';
        } else {
          block.style.display = (cid === f) ? '' : 'none';
        }
      });
    }
  }

  function buildCompCard(comp) {
    const card = el('div', {className: 'comp-card', 'data-status': comp.status});
    const row = el('div', {className: 'ch-row'}, [
      el('span', {className: 'status-dot ' + comp.status}),
      el('span', {className: 'name'}, comp.name),
      el('span', {className: 'badge ' + comp.status}, comp.status === 'complete' ? 'Complete' : comp.status === 'partial' ? 'Needs Work' : comp.status === 'missing' ? 'Missing' : 'Stub'),
      el('span', {className: 'arrow'}, '▶')
    ]);
    card.appendChild(row);
    const detail = el('div', {className: 'detail'});
    detail.appendChild(el('div', null, comp.desc));
    if (comp.file) detail.appendChild(el('div', {className: 'file-chip'}, comp.file));
    if (comp.tags && comp.tags.length) {
      const tr = el('div', {className: 'tag-row'});
      comp.tags.forEach(t => tr.appendChild(el('span', {className: 'tag'}, t)));
      detail.appendChild(tr);
    }
    card.appendChild(detail);
    card.addEventListener('click', () => card.classList.toggle('expanded'));
    return card;
  }

  // RENDER: CHECKLIST
  // ============================================================
  const STORAGE_KEY = 'cliniq-hackathon-launch-readiness-v1';

  function loadDone() {
    try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); }
    catch (e) { return new Set(); }
  }
  function saveDone(set) { localStorage.setItem(STORAGE_KEY, JSON.stringify([...set])); }
  function keyFor(group, text) { return group + '|' + text; }

  let doneSet = loadDone();

  function renderChecklist() {
    const p = panels.checklist;
    clearChildren(p);
    p.appendChild(el('div', {className: 'section-title'}, 'Launch readiness checklist'));

    const total = checklistData.reduce((acc, g) => acc + g.items.length, 0);
    const done = [...doneSet].filter(k => checklistData.some(g => g.items.some(i => keyFor(g.id, i.text) === k))).length;
    const pct = total ? Math.round(done / total * 100) : 0;

    const big = el('div', {className: 'progress-bar-large'});
    const fill = el('div', {className: 'fill', style: 'width: ' + pct + '%'});
    fill.appendChild(el('div', {className: 'label'}, done + ' / ' + total + ' (' + pct + '%)'));
    big.appendChild(fill);
    p.appendChild(big);

    checklistData.forEach(g => {
      const grp = el('div', {className: 'ck-group'});
      const h = el('h3');
      h.appendChild(el('span', {className: 'priority-dot ' + g.dotClass}));
      h.appendChild(el('span', null, g.label));
      grp.appendChild(h);
      const list = el('div', {className: 'ck-list'});
      g.items.forEach(i => {
        const k = keyFor(g.id, i.text);
        const isDone = doneSet.has(k);
        const item = el('div', {className: 'ck-item' + (isDone ? ' done' : '')});
        const cb = el('input', {type: 'checkbox'});
        cb.checked = isDone;
        cb.addEventListener('change', () => {
          if (cb.checked) doneSet.add(k); else doneSet.delete(k);
          saveDone(doneSet);
          renderChecklist();
          renderSummary();
        });
        item.appendChild(cb);
        const txt = el('div', {className: 'ck-text'});
        txt.appendChild(document.createTextNode(i.text));
        if (i.detail) {
          txt.appendChild(el('span', {className: 'ck-detail'}, i.detail));
        }
        item.appendChild(txt);
        item.addEventListener('click', (e) => { if (e.target !== cb) cb.click(); });
        list.appendChild(item);
      });
      grp.appendChild(list);
      p.appendChild(grp);
    });
  }
